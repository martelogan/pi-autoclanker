<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">pi-autoclanker logo</title>
  <desc id="desc">A robot head beneath a probabilistic graph halo, with a large pi-mark on the forehead to represent the pi-native autoclanker extension.</desc>
  <defs>
    <linearGradient id="bg" x1="82" y1="72" x2="428" y2="444" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1730"/>
      <stop offset="1" stop-color="#132B47"/>
    </linearGradient>
    <linearGradient id="haloArc" x1="160" y1="126" x2="352" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8D7CFF"/>
      <stop offset="0.52" stop-color="#67B6FF"/>
