<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" role="img" aria-labelledby="title desc">
  <title id="title">pi-autoclanker mental model</title>
  <desc id="desc">A compact top-down loop from rough ideas to preview, lane comparison, eval, fit, and the next comparison.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ea; }
      .title { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #143d59; }
      .label { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #143d59; }
      .copy { font: 500 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #36536b; }
      .gold { fill: #f4e0b7; stroke: #c28b29; }
      .blue { fill: #d8ecf5; stroke: #1f6b8a; }
      .purple { fill: #ece3f5; stroke: #6b5b95; }
      .green { fill: #d8ecd8; stroke: #214e34; }
      .node { rx: 16; ry: 16; stroke-width: 2; }
      .arrow { stroke: #36536b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .loop { stroke: #36536b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); opacity: 0.9; }
      .loopLabel { font: 600 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #36536b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#36536b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="470" rx="24" ry="24"/>
  <text class="title" x="380" y="38" text-anchor="middle">Start simple. Keep the loop explicit.</text>

  <rect class="node gold" x="220" y="70" width="320" height="54"/>
  <text class="label" x="380" y="93" text-anchor="middle">Goal + rough ideas</text>
  <text class="copy" x="380" y="111" text-anchor="middle">Direct prompt or a tiny ideas file.</text>

  <path class="arrow" d="M380 124 L380 164"/>

  <rect class="node blue" x="220" y="166" width="320" height="54"/>
  <text class="label" x="380" y="189" text-anchor="middle">Preview beliefs</text>
  <text class="copy" x="380" y="207" text-anchor="middle">Typed and inspectable before apply.</text>

  <path class="arrow" d="M380 220 L380 260"/>

  <rect class="node purple" x="220" y="262" width="320" height="54"/>
  <text class="label" x="380" y="285" text-anchor="middle">Candidate lanes</text>
  <text class="copy" x="380" y="303" text-anchor="middle">Keep [A], [B], and [A+B] explicit.</text>

  <path class="arrow" d="M380 316 L380 356"/>

  <rect class="node green" x="220" y="358" width="320" height="54"/>
  <text class="label" x="380" y="381" text-anchor="middle">Eval -> fit -> suggest</text>
  <text class="copy" x="380" y="399" text-anchor="middle">Run under the locked snapshot.</text>

  <path class="loop" d="M540 385 C620 385, 646 302, 646 242 C646 186, 618 166, 542 166"/>
  <text class="loopLabel" x="640" y="244" text-anchor="middle">next comparison</text>
</svg>
